<!DOCTYPE html>
<html>
<head>
  <title>Perception Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>IQ Test</h1>
  <p class="subtitle">Do you have an I for Aesthetics?</p>

  <!-- Eyes -->
  <div class="section">
    <h2>Pick the prettiest eyes</h2>
    <div class="grid" id="eyes">
      <img src="images/eyes1.jpg" data-correct="false">
      <img src="images/eyes2.jpg" data-correct="true">
      <img src="images/eyes3.jpg" data-correct="false">
    </div>
  </div>

  <!-- Smile -->
  <div class="section">
    <h2>Pick the prettiest smile</h2>
    <div class="grid" id="smile">
      <img src="images/eyes1.png" data-correct="false">
      <img src="images/eyes2.png" data-correct="true">
      <img src="images/eyes3.png" data-correct="false">
    </div>
  </div>

  <button onclick="checkAnswers()">Submit</button>

  <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
